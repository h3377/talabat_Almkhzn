<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الأصول والعهد والأندية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;600;700;800&family=Almarai:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<style>
:root{
  --bg:#F5F7FA;
  --surface:#FFFFFF;
  --surface-alt:#EEF3F9;
  --ink:#16212B;
  --muted:#5B6A78;
  --hint:#8C97A3;
  --border:#DCE4EC;
  --primary:#1B5FA6;
  --primary-dark:#0B3B6B;
  --primary-light:#E5EFFA;
  --primary-mid:#2E76C2;
  --amber:#B9791F;
  --amber-bg:#FBF0DD;
  --coral:#8A1538;
  --coral-bg:#F7E3E8;
  --green:#2F7D4F;
  --green-bg:#E4F1E8;
  --gray-bg:#EDEDE7;
  --radius:10px;
  --shadow:0 1px 2px rgba(11,59,107,0.06), 0 4px 14px rgba(11,59,107,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Almarai',sans-serif;
  font-size:15px;
  line-height:1.7;
}
h1,h2,h3,h4,.brand,.nav-label,.stat-num{font-family:'Cairo',sans-serif;}
::selection{background:var(--primary-light);}
button{font-family:'Almarai',sans-serif;cursor:pointer;}
input,select,textarea{font-family:'Almarai',sans-serif;}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:250px;flex:none;background:var(--primary-dark);color:#EAF2EF;
  display:flex;flex-direction:column;padding:22px 16px;gap:4px;
}
.brand{display:flex;align-items:center;gap:10px;padding:0 6px 20px 6px;border-bottom:1px solid rgba(255,255,255,0.12);margin-bottom:14px;}
.brand .mark{
  width:38px;height:38px;border-radius:9px;background:linear-gradient(155deg,var(--primary-mid),var(--primary));
  display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px;flex:none;
  border:1px solid rgba(255,255,255,0.25);
}
.brand .txt{font-size:15px;font-weight:700;color:#fff;}
.brand .sub{font-size:11px;color:#9FC2B7;font-weight:400;font-family:'Almarai',sans-serif;}
.nav-group{margin:10px 0 2px 0;padding:0 8px;font-size:11px;color:#7FA79B;font-weight:700;letter-spacing:.3px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#D6E7E2;
  font-size:14px;font-weight:400;text-decoration:none;border:1px solid transparent;position:relative;
}
.nav-item .ic{width:18px;height:18px;flex:none;display:flex;align-items:center;justify-content:center;}
.nav-item:hover{background:rgba(255,255,255,0.06);}
.nav-item.active{background:var(--primary-mid);color:#fff;font-weight:700;}
.nav-item .badge{margin-right:auto;background:var(--amber);color:#3A2606;font-size:11px;font-weight:700;border-radius:20px;padding:1px 7px;}

.main{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;gap:14px;padding:14px 26px;background:var(--surface);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;
}
.topbar h1{font-size:19px;font-weight:700;margin:0;color:var(--ink);}
.topbar .desc{font-size:12.5px;color:var(--muted);margin-top:1px;}
.role-switch{margin-right:auto;display:flex;align-items:center;gap:10px;}
.role-switch label{font-size:12px;color:var(--muted);}
.role-switch select{
  padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface-alt);
  font-size:13px;color:var(--ink);font-weight:700;
}
.bell{position:relative;width:36px;height:36px;border-radius:8px;background:var(--surface-alt);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;}
.bell .dot{position:absolute;top:5px;left:6px;width:8px;height:8px;border-radius:50%;background:var(--coral);border:2px solid var(--surface);}
.content{padding:22px 26px 60px 26px;max-width:1280px;width:100%;}

/* ---------- Generic components ---------- */
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.section-head h2{font-size:20px;margin:0 0 3px 0;font-weight:700;}
.section-head p{margin:0;color:var(--muted);font-size:13px;}
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;border:1px solid transparent;
  font-size:13.5px;font-weight:700;background:var(--primary);color:#fff;transition:background .15s;
}
.btn:hover{background:var(--primary-mid);}
.btn.secondary{background:var(--surface);color:var(--ink);border:1px solid var(--border);}
.btn.secondary:hover{background:var(--surface-alt);}
.btn.danger{background:var(--coral);color:#fff;}
.btn.ghost{background:transparent;color:var(--primary);padding:6px 8px;font-size:12.5px;}
.btn.sm{padding:6px 11px;font-size:12.5px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.grid{display:grid;gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-5{grid-template-columns:repeat(5,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}


.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card .pad{padding:18px;}
.stat-card{padding:10px 12px;}
.stat-card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.stat-card .lbl{font-size:11px;color:var(--muted);font-weight:700;}
.stat-card .ic{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;
  background:radial-gradient(circle at 35% 30%,#FFE083,#F5A623 70%);color:#3A2606;
  box-shadow:0 0 0 3px rgba(245,166,35,.14),0 0 9px 1px rgba(245,166,35,.65);}
.stat-num{font-size:19px;font-weight:800;color:var(--ink);}
.stat-sub{font-size:10px;color:var(--hint);margin-top:1px;}

table{width:100%;border-collapse:collapse;font-size:13.5px;}
thead th{
  text-align:right;font-size:11.5px;color:var(--muted);font-weight:700;padding:10px 12px;
  border-bottom:1px solid var(--border);background:var(--surface-alt);white-space:nowrap;
}
thead th:first-child{border-top-right-radius:8px;}
thead th:last-child{border-top-left-radius:8px;}
tbody td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface-alt);}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
.table-wrap table{border:none;}
.table-ruled thead th{border:1px solid var(--border);}
.table-ruled tbody td{border:1px solid var(--border);}
.table-ruled tbody tr:last-child td{border-bottom:1px solid var(--border);}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.pill.gray{background:var(--gray-bg);color:var(--muted);}
.pill.green{background:var(--green-bg);color:var(--green);}
.pill.amber{background:var(--amber-bg);color:var(--amber);}
.pill.coral{background:var(--coral-bg);color:var(--coral);}
.pill.teal{background:var(--primary-light);color:var(--primary);}

.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.field label{font-size:12.5px;font-weight:700;color:var(--ink);}
.field .hint{font-size:11px;color:var(--hint);font-weight:400;}
.field input,.field select,.field textarea{
  padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface);
  font-size:13.5px;color:var(--ink);width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--primary-mid);outline-offset:1px;border-color:var(--primary-mid);}
.field textarea{resize:vertical;min-height:64px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
@media(max-width:1000px){.grid.cols-4,.grid.cols-5{grid-template-columns:repeat(2,1fr);} .grid.cols-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:860px){
  .app{flex-direction:column;}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:12px;gap:6px;}
  .sidebar .brand{width:100%;}
  .sidebar>div[style*="margin-top:auto"]{display:none;}
  .nav-group{display:none;}
  .nav-item{padding:7px 10px;font-size:12.5px;}
  .content{padding:14px;}
  .topbar{flex-wrap:wrap;padding:10px 14px;gap:8px;}
  #global-search{width:150px!important;}
  .grid.cols-4,.grid.cols-3,.grid.cols-2,.grid.cols-5{grid-template-columns:1fr 1fr;}
  .detail-list{grid-template-columns:1fr;}
}
@media(max-width:520px){
  .grid.cols-4,.grid.cols-3,.grid.cols-2,.grid.cols-5{grid-template-columns:1fr;}
  .modal{max-width:96vw!important;}
  #global-search{width:110px!important;font-size:11px!important;}
  .topbar h1{font-size:16px;}
}
@media(max-width:700px){.form-grid{grid-template-columns:1fr;}}

/* stock bar - signature element representing custody flow */
.stockbar{display:flex;height:8px;border-radius:5px;overflow:hidden;background:var(--gray-bg);width:150px;}
.stockbar span{height:100%;}
.stockbar .s-avail{background:var(--primary-mid);}
.stockbar .s-loan{background:var(--amber);}
.stockbar .s-dmg{background:var(--coral);}
.stockbar .s-res{background:#9AA79F;}
.stockbar-legend{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-top:14px;flex-wrap:wrap;}
.stockbar-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:5px;}

.empty{padding:40px 20px;text-align:center;color:var(--hint);}
.empty .ic{font-size:26px;margin-bottom:8px;}

#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--primary-dark) 0%,var(--primary) 55%,#0a2f52 100%);position:relative;overflow:hidden}
#login-screen.hide{display:none}
.login-card{position:relative;background:var(--surface);border-radius:18px;padding:38px 34px;width:400px;max-width:92vw;
  box-shadow:0 30px 60px rgba(0,0,0,.35);border-top:5px solid var(--coral)}
.login-logo{width:60px;height:60px;border-radius:16px;background:var(--primary-light);display:flex;align-items:center;
  justify-content:center;font-size:30px;margin:0 auto 14px}
.login-title{text-align:center;font-weight:800;font-size:17px;color:var(--primary-dark);margin-bottom:4px}
.login-sub{text-align:center;color:var(--muted);font-size:12px;margin-bottom:20px}
.login-field{margin-bottom:12px}
.login-field label{font-size:12px;font-weight:700;color:var(--primary-dark);display:block;margin-bottom:5px}
.login-field input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px}
.login-err{color:var(--coral);font-size:12px;margin-bottom:8px;display:none}
.modal-overlay{
  min-height:400px;background:rgba(15,25,20,0.45);display:flex;align-items:center;justify-content:center;
  position:fixed;inset:0;z-index:50;padding:20px;
}
.modal{background:var(--surface);border-radius:14px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal .mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);}
.modal .mhead h3{margin:0;font-size:16px;}
.modal .mbody{padding:20px 22px;}
.modal .mfoot{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-start;gap:10px;}
.x-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface-alt);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);}

.tabs{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:18px;flex-wrap:wrap;}
.tab{padding:9px 14px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;background:none;border-radius:0;}
.tab.active{color:var(--primary);border-color:var(--primary);}

.note-banner{display:flex;gap:10px;align-items:flex-start;background:var(--primary-light);border:1px solid #C6DED8;color:var(--primary-dark);
  padding:12px 14px;border-radius:10px;font-size:12.5px;margin-bottom:18px;}

.detail-list{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;font-size:13px;margin-bottom:6px;}
.detail-list div b{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:2px;}

.n-item{display:flex;gap:12px;padding:14px 4px;border-bottom:1px solid var(--border);}
.n-item:last-child{border-bottom:none;}
.n-ic{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;}
.n-item .t{font-size:13.5px;margin:0 0 3px 0;}
.n-item .d{font-size:11.5px;color:var(--hint);}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
::placeholder{color:var(--hint);}
</style>

const BOX_KEY='main';
// الحقول المشتركة فقط (بيانات العمل) — أما تسجيل الدخول الحالي والشاشة المفتوحة والفلاتر
// فتبقى محلية لكل جهاز ولا تُزامَن، حتى لا يتحكم جهاز في جلسة جهاز آخر.
const SYNC_FIELDS=['orgName','orgLogo','announcement','roles','clubs','categories','units',
  'users','assets','loans','returns','damages','reservations','purchaseRequests','notifications','auditLogs'];
let _db=null,_root=null,_fbReady=false,_saveT=null,_lastHash=null,_applying=false,_lastKnownTotal=null;

function setSyncBadge(st){
  let el=document.getElementById('syncBadge');
  if(!el){el=document.createElement('div');el.id='syncBadge';
    el.style.cssText='position:fixed;bottom:14px;left:14px;z-index:99999;font-family:Tajawal,sans-serif;font-size:12px;font-weight:700;padding:7px 14px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.18);display:flex;gap:7px;transition:.3s;direction:rtl';
    document.body.appendChild(el);}
  const m={saving:['#fef9c3','#b45309','🔄 جارٍ الحفظ...'],synced:['#d5f5e3','#0a7c4e','✅ محفوظ ومتزامن'],offline:['#fde8e8','#c0392b','⚠️ غير متصل — يعمل محليًا فقط'],loading:['#e8f0fb','#0f2d5e','⏳ جارٍ التحميل...']};
  const c=m[st]||m.synced; el.style.background=c[0]; el.style.color=c[1]; el.textContent=c[2];
  if(st==='synced'){ clearTimeout(el._t); el._t=setTimeout(()=>{el.style.opacity='.45';},2500); } else { clearTimeout(el._t); el.style.opacity='1'; }
}
function collectSharedState(){
  const out={}; SYNC_FIELDS.forEach(k=>{ out[k]=state[k]; }); out.seq=seq; return out;
}
function stateTotal(s){
  if(!s) return 0;
  return (s.assets||[]).length+(s.loans||[]).length+(s.users||[]).length+(s.clubs||[]).length+(s.purchaseRequests||[]).length;
}
function applySharedState(s){
  if(!s) return;
  SYNC_FIELDS.forEach(k=>{ if(s[k]!==undefined) state[k]=s[k]; });
  if(s.seq) Object.keys(s.seq).forEach(k=>{ seq[k]=s.seq[k]; });
}
function cloudSave(force){
  if(!_fbReady||_applying) return;
  const s=collectSharedState(); const h=JSON.stringify(s);
  if(!force&&h===_lastHash) return;
  // حماية من فقدان البيانات: لا نكتب حالة شبه فارغة فوق نسخة سحابية موثوقة أكبر بكثير
  const newTotal=stateTotal(s);
  if(_lastKnownTotal!==null&&_lastKnownTotal>=5&&newTotal<Math.max(1,_lastKnownTotal*0.1)){
    console.error('⛔ تم إيقاف الحفظ التلقائي وقائيًا: البيانات المحلية أقل بكثير من آخر نسخة موثوقة. أعد تحميل الصفحة.');
    setSyncBadge('offline');
    return;
  }
  _lastHash=h; setSyncBadge('saving');
  clearTimeout(_saveT);
  _saveT=setTimeout(()=>{
    _root.set(Object.assign({},s,{_ts:Date.now()}))
      .then(()=>{ setSyncBadge('synced'); _lastKnownTotal=newTotal; })
      .catch(e=>{ console.error('Firestore save:',e); setSyncBadge('offline'); });
  },300);
}
function scheduleServerSave(){ cloudSave(false); }
function initFirebaseSync(){
  try{
    if(!window.firebase||firebaseConfig.apiKey.indexOf('PASTE_')===0){
      console.warn('⚠️ لم يتم ضبط Firebase بعد — التطبيق يعمل محليًا بدون مزامنة سحابية.');
      setSyncBadge('offline');
      render();
      return;
    }
    firebase.initializeApp(firebaseConfig);
    _db=firebase.firestore();
    _root=_db.collection('talabat-almkhzn').doc(BOX_KEY);
    _fbReady=true; setSyncBadge('loading');
    _root.onSnapshot(d=>{
      if(!d.exists){ cloudSave(true); render(); return; } // أول تشغيل: زرع البيانات الحالية
      _applying=true; applySharedState(d.data());
      _lastHash=JSON.stringify(collectSharedState()); _applying=false;
      _lastKnownTotal=stateTotal(d.data());
      render(); setSyncBadge('synced');
    }, err=>{ console.error('Firestore read:',err); setSyncBadge('offline'); render(); });
  }catch(e){ console.error('تعذّر الاتصال بـ Firebase:',e); setSyncBadge('offline'); render(); }
}

  if(oldPass!==cu.password){alert('كلمة المرور الحالية غير صحيحة');return;}
  if(!newPass||newPass.length<4){alert('كلمة المرور الجديدة يجب أن تكون 4 أحرف على الأقل');return;}
  if(newPass!==confirmPass){alert('كلمة المرور الجديدة وتأكيدها غير متطابقين');return;}
  cu.password=newPass;
  addAudit(cu.fullName,'تغيير كلمة المرور','users',cu.username);
  closeModal();
  alert('تم تغيير كلمة المرور بنجاح');
}

/* ---------------------- شريط المخزون (العنصر المميز) ---------------------- */
function stockbar(a){
  const total=a.qtyTotal||1;
  const pct=v=>Math.max(0,(v/total*100)).toFixed(1);
  return `<div class="stockbar" title="متاح ${a.qtyAvailable} / معار ${a.qtyLoaned} / تالف ${a.qtyDamaged} / محجوز ${a.qtyReserved}">
    <span class="s-avail" style="width:${pct(a.qtyAvailable)}%"></span>
    <span class="s-loan" style="width:${pct(a.qtyLoaned)}%"></span>
    <span class="s-dmg" style="width:${pct(a.qtyDamaged)}%"></span>
    <span class="s-res" style="width:${pct(a.qtyReserved)}%"></span>
  </div>`;
}
const stockLegend=`<div class="stockbar-legend">
  <span><span class="dot" style="background:var(--primary-mid)"></span>متاح</span>
  <span><span class="dot" style="background:var(--amber)"></span>معار</span>
  <span><span class="dot" style="background:var(--coral)"></span>تالف</span>
  <span><span class="dot" style="background:#9AA79F"></span>محجوز</span>
</div>`;

/* ---------------------- لوحة التحكم ---------------------- */
function statCard(lbl,num,sub,icon,ramp){
  return `
    <div class="card stat-card">
      <div class="top">
        <span class="lbl">${lbl}</span>
        <span class="ic">${ic(icon,15)}</span>
      </div>
      <div class="stat-num">${num}</div>
      <div class="stat-sub">${sub}</div>
    </div>`;
}
function daysBetween(dateStr){
  if(!dateStr) return Infinity;
  const d1=new Date(dateStr), d2=new Date(todayStr());
  return Math.round((d2-d1)/(1000*60*60*24));
}

    if(f.cat&&a.category!==f.cat)return false;
    if(f.unit&&a.unit!==f.unit)return false;

    return true;
  });
  const damagedTotal=fixedAssetsOnly.reduce((s,a)=>s+a.qtyDamaged,0);

    const items=fixedAssetsOnly.filter(a=>a.category===c);

        </select></div>

function addCategory(){
  const v=document.getElementById('new-cat').value.trim();
  if(!v){return;}
  if(state.categories.includes(v)){alert('هذا التصنيف موجود مسبقًا');return;}
  state.categories.push(v);
  openCatUnitModal();
}
function delCategory(name){
  if(state.assets.some(a=>a.category===name)){alert('لا يمكن حذف هذا التصنيف لوجود أصول مرتبطة به');return;}
  state.categories=state.categories.filter(c=>c!==name);
  openCatUnitModal();
}
function addUnit(){
  const v=document.getElementById('new-unit').value.trim();
  if(!v){return;}
  if(state.units.includes(v)){alert('هذه الوحدة موجودة مسبقًا');return;}
  state.units.push(v);
  openCatUnitModal();
}
function delUnit(name){
  if(state.assets.some(a=>a.unit===name)){alert('لا يمكن حذف هذه الوحدة لوجود أصول مرتبطة بها');return;}
  state.units=state.units.filter(u=>u!==name);
  openCatUnitModal();
}
function quickAddCategory(){
  const v=prompt('اسم التصنيف الجديد:');
  if(!v)return;
  if(!state.categories.includes(v))state.categories.push(v);
  const sel=document.getElementById('f-cat');
  if(sel){sel.innerHTML=state.categories.map(c=>`<option ${c===v?'selected':''}>${c}</option>`).join('');}
}
function quickAddUnit(){
  const v=prompt('اسم الوحدة الجديدة:');
  if(!v)return;
  if(!state.units.includes(v))state.units.push(v);
  const sel=document.getElementById('f-unit');
  if(sel){sel.innerHTML=state.units.map(u=>`<option ${u===v?'selected':''}>${u}</option>`).join('');}
}

  if(!entryDate){ alert('الرجاء إدخال تاريخ دخول الأصل'); return; }
  const existing=state.assets.find(a=>a.name.trim().toLowerCase()===name.toLowerCase());
  if(existing){
    existing.qtyTotal+=qty; existing.qtyAvailable+=qty;
    addAudit(state.users.find(u=>u.username===state.currentUser)?.fullName||state.currentRole,'إضافة كمية على أصل موجود','assets',existing.code);

    return;
  }
  seq.asset++;
  state.assets.push({
    id:seq.asset, code:'AST-'+pad(seq.asset), name,
    category:document.getElementById('f-cat').value,
    unit:document.getElementById('f-unit').value||'قطعة',

    col:document.getElementById('f-col').value.trim(),
    entryDate:document.getElementById('f-date').value,
    condition:document.getElementById('f-cond').value
  });
  addAudit(state.users.find(u=>u.username===state.currentUser)?.fullName||state.currentRole,'إضافة أصل','assets','AST-'+pad(seq.asset));
  closeModal();
}

function submitEditAsset(assetId){
  const a=findAsset(assetId); if(!a) return;
  const name=document.getElementById('f-name').value.trim();
  const qty=parseInt(document.getElementById('f-qty').value)||0;
  const committed=a.qtyLoaned+a.qtyReserved+a.qtyDamaged;
  if(!name){alert('الرجاء إدخال اسم الأصل');return;}
  if(qty<committed){alert('العدد الكلي لا يمكن أن يقل عن العدد المعار/المحجوز/التالف حاليًا ('+committed+')');return;}
  a.name=name;
  a.category=document.getElementById('f-cat').value;
  a.unit=document.getElementById('f-unit').value||a.unit;
  a.qtyTotal=qty; a.qtyAvailable=qty-committed;
  a.location=document.getElementById('f-loc').value||'—';
  a.shelf=document.getElementById('f-shelf').value.trim();
  a.row=document.getElementById('f-row').value.trim();
  a.col=document.getElementById('f-col').value.trim();
  a.entryDate=document.getElementById('f-date').value;
  a.condition=document.getElementById('f-cond').value;
  addAudit(currentUserObj()?.fullName||state.currentRole,'تعديل أصل','assets',a.code);
  closeModal();render();
}
function deleteAsset(assetId){
  const a=findAsset(assetId); if(!a) return;
  if(a.qtyLoaned>0||a.qtyReserved>0){alert('لا يمكن حذف هذا الأصل لوجود عهد أو حجوزات نشطة مرتبطة به');return;}
  if(!confirm('هل تريد حذف الأصل «'+a.name+'» نهائيًا؟'))return;
  state.assets=state.assets.filter(x=>x.id!==assetId);
  addAudit(currentUserObj()?.fullName||state.currentRole,'حذف أصل','assets',a.code);
  render();
}

/* ---------------------- إخراج عهدة ---------------------- */
function loanStatusPill(sOrLoan){
  const map={'نشطة':'teal','مرجعة جزئياً':'amber','مرجعة بالكامل':'green','متأخرة':'coral'};
  if(sOrLoan&&typeof sOrLoan==='object'){
    const l=sOrLoan;
    if(l.status==='مرجعة بالكامل'&&l.totalDamaged>0){
      return `<span class="pill amber">تم الإرجاع ويوجد تالف عدد (${l.totalDamaged})</span>`;
    }
    if(l.status==='مرجعة جزئياً'&&l.totalDamaged>0){
      return `<span class="pill amber">مرجعة جزئياً — يوجد تالف عدد (${l.totalDamaged})</span>`;
    }
    return `<span class="pill ${map[l.status]||'gray'}">${l.status}</span>`;
  }
  return `<span class="pill ${map[sOrLoan]||'gray'}">${sOrLoan}</span>`;
}
if(!state.issueUI) state.issueUI={q:'',cat:''};
function returnUrgency(l){
  if(l.status!=='نشطة'||!l.expectedReturn)return null;
  const days=Math.ceil((new Date(l.expectedReturn)-new Date('2026-07-04'))/86400000);
  if(days<0)return {label:'⏰ متأخرة عن الاستلام',cls:'coral'};
  if(days<=3)return {label:'⏳ يقترب موعد الاستلام',cls:'amber'};
  return null;
}
function renderIssue(){
  const ui=state.issueUI;
  const filtered=state.loans.filter(l=>{
    const a=findAsset(l.assetId);
    if(ui.q&&!(a&&a.name.toLowerCase().includes(ui.q.toLowerCase())))return false;
    if(ui.cat&&!(a&&a.category===ui.cat))return false;
    return true;
  });
  const rows=filtered.slice().reverse().map(l=>{
    const a=findAsset(l.assetId); const club=findClub(l.clubId);
    const urgency=returnUrgency(l);

    return `<tr>
      <td><input type="checkbox" class="issue-check" value="${l.id}"></td>
      <td style="font-weight:700;">${l.number}</td>

      <td><a href="javascript:void(0)" onclick="openBeneficiarySheet('${escapeHtml(l.recipient)}')" style="color:var(--primary);font-weight:700;text-decoration:underline;">${escapeHtml(l.recipient)}</a><div style="color:var(--hint);font-size:11.5px;">${escapeHtml(club?club.name:'')}</div></td>
      <td>${l.qty}</td>
      <td>${isConsumableCustody?`<span class="pill coral">مستهلكة - غير راجعة</span>`:`<span class="pill teal">راجعة</span>`}</td>
      <td>${l.issueDate}</td>
      <td>${l.expectedReturn||'—'}</td>
      <td>${loanStatusPill(l)}${urgency?`<div style="margin-top:4px;"><span class="pill ${urgency.cls}">${urgency.label}</span></div>`:''}</td>
      <td style="display:flex;gap:4px;"><button class="btn sm secondary" onclick="printIssueVoucher('${l.groupNumber||l.number}')" title="طباعة سند الخروج">${ic('printer',13)}</button>
      <button class="btn sm danger" onclick="deleteLoanGroup('${l.groupNumber||l.number}')">${ic('x',13)}</button></td>
    </tr>`;
  }).join('');
  return `
    <div class="note-banner">${ic('out',15)} عند حفظ عملية الإخراج، يخصم النظام العدد تلقائيًا من رصيد "المتاح" ويحوّله إلى "معار".</div>
    <div class="section-head">
      <div><h2>سجل العهد الخارجة</h2><p>${filtered.length} من ${state.loans.length} عملية إخراج</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn secondary" onclick="openBulkPrintByUserModal()">${ic('printer',15)} طباعة مجمّعة حسب المستخدم</button>

        <button class="btn secondary" onclick="printAllIssueRecords()">${ic('printer',15)} طباعة شاملة لكل السجلات</button>
        <button class="btn" onclick="openIssueModal()">${ic('plus',15)} إخراج عهدة جديدة</button>
      </div>
    </div>
    <div class="card" style="padding:14px;margin-bottom:14px;display:flex;gap:12px;flex-wrap:wrap;">
      <div class="field" style="margin:0;flex:1;min-width:200px;"><label>بحث باسم العهدة</label><input value="${escapeHtml(ui.q)}" oninput="state.issueUI.q=this.value;render()" placeholder="ابحث..."></div>
      <div class="field" style="margin:0;min-width:180px;"><label>التصنيف</label>
        <select onchange="state.issueUI.cat=this.value;render()"><option value="">الكل</option>${state.categories.map(c=>`<option ${ui.cat===c?'selected':''}>${c}</option>`).join('')}</select></div>

        <tbody>${rows||`<tr><td colspan="10" class="empty">لا توجد عهد مطابقة</td></tr>`}</tbody>
      </table>
    </div>`;
}
function openBeneficiarySheet(recipient){
  const loans=state.loans.filter(l=>l.recipient===recipient);
  if(!loans.length)return;
  const statusLabel=l=>{
    const a=findAsset(l.assetId);
    if(l.status==='نشطة'||l.status==='متأخرة') return `<span class="pill ${l.status==='متأخرة'?'coral':'teal'}">عهدة — ${l.status}</span>`;
    if(l.status==='مرجعة جزئياً') return loanStatusPill(l);
    if(l.status==='مرجعة بالكامل') return l.totalDamaged>0?loanStatusPill(l):`<span class="pill green">معاد</span>`;
    return `<span class="pill gray">${l.status}</span>`;

function assetOptionsFiltered(f){

}

function submitIssue(){
  const recSel=document.getElementById('i-recipient');
  const recipient=state.users.find(x=>x.id===parseInt(recSel.value));
  if(!recipient){alert('الرجاء اختيار المستلم من القائمة');return;}
  const issueDate=document.getElementById('i-issue').value;
  const expectedReturn=document.getElementById('i-exp').value;
  if(!issueDate){alert('الرجاء إدخال تاريخ الخروج');return;}
  if(!expectedReturn){alert('الرجاء إدخال تاريخ الإرجاع المتوقع');return;}
  const validItems=issueItems.filter(it=>it.assetId);
  if(!validItems.length){alert('الرجاء إضافة صنف واحد على الأقل');return;}
  for(const it of validItems){
    const a=findAsset(parseInt(it.assetId));
    if(!a){alert('أصل غير صالح');return;}
    if(!it.qty||it.qty<=0||it.qty>a.qtyAvailable){alert(`العدد المطلوب لـ${a.name} غير متاح. المتاح حاليًا: ${a.qtyAvailable}`);return;}
  }
  const createdBy=currentUserObj()?.fullName||state.currentRole;
  const groupNo='AS-'+pad(seq.loan+1,4);
  validItems.forEach(it=>{
    const a=findAsset(parseInt(it.assetId));
    a.qtyAvailable-=it.qty; a.qtyLoaned+=it.qty;
    seq.loan++;
    state.loans.push({
      id:seq.loan, number:'AS-'+pad(seq.loan,4), groupNumber:groupNo, assetId:a.id, clubId:recipient.clubId,
      recipient:recipient.fullName, phone:recipient.phone,
      qty:it.qty, issueDate, expectedReturn, status:'نشطة', createdBy
    });
  });
  const club=findClub(recipient.clubId);
  addNotification('loan',`تم إخراج عهدة (${validItems.length} صنف) لصالح ${club?club.name:recipient.fullName}`);
  addAudit(createdBy,'إخراج عهدة','asset_loans',groupNo);
  closeModal();
}

function undoLastReturn(groupNumber){
  const items=state.loans.filter(l=>(l.groupNumber||l.number)===groupNumber);
  let latestDate=null;
  items.forEach(l=>{
    state.returns.filter(r=>r.loanId===l.id).forEach(r=>{ if(!latestDate||r.date>latestDate) latestDate=r.date; });
  });
  if(!latestDate){alert('لا يوجد إرجاع سابق لهذه العهدة');return;}
  if(!confirm('هل تريد التراجع عن آخر عملية إرجاع بتاريخ '+latestDate+'؟ سيتم إلغاء الكميات والتلفيات المرتبطة بها (إن لم تُعتمَد بعد).'))return;
  let blocked=false;
  items.forEach(l=>{
    const retsToUndo=state.returns.filter(r=>r.loanId===l.id&&r.date===latestDate);
    retsToUndo.forEach(r=>{
      const relatedDmg=state.damages.find(d=>d.loanNumber===l.number&&d.date===r.date&&d.qty===r.qtyDamaged);
      if(relatedDmg&&relatedDmg.status!=='بانتظار الاعتماد'){ blocked=true; return; }
    });
  });
  if(blocked){alert('لا يمكن التراجع — تم اعتماد أو رفض التلف المرتبط بهذا الإرجاع مسبقًا من قِبل المدير.');return;}
  items.forEach(l=>{
    const a=findAsset(l.assetId);
    const retsToUndo=state.returns.filter(r=>r.loanId===l.id&&r.date===latestDate);
    retsToUndo.forEach(r=>{
      a.qtyLoaned+=r.qtyReturned; a.qtyAvailable-=(r.qtyReturned-r.qtyDamaged);
      l.qty+=r.qtyReturned;
      l.totalDamaged=Math.max(0,(l.totalDamaged||0)-r.qtyDamaged);
      const dmgIdx=state.damages.findIndex(d=>d.loanNumber===l.number&&d.date===r.date&&d.qty===r.qtyDamaged&&d.status==='بانتظار الاعتماد');
      if(dmgIdx>-1) state.damages.splice(dmgIdx,1);
      const retIdx=state.returns.indexOf(r);
      if(retIdx>-1) state.returns.splice(retIdx,1);
    });
    const remainingReturns=state.returns.some(r=>r.loanId===l.id);
    l.status = l.qty<=0?'مرجعة بالكامل':(remainingReturns?'مرجعة جزئياً':'نشطة');
  });
  addAudit(currentUserObj()?.fullName||state.currentRole,'تراجع عن إرجاع عهدة (تصحيح خطأ)','asset_returns',groupNumber);
  addNotification('loan',`تم التراجع عن آخر إرجاع لعهدة ${groupNumber} بتاريخ ${latestDate}`);
  render();
}

function submitReturnGroup(groupNumber){
  const items=state.loans.filter(l=>(l.groupNumber||l.number)===groupNumber&&(l.status==='نشطة'||l.status==='متأخرة'||l.status==='مرجعة جزئياً'));
  const date=document.getElementById('rg-date').value;
  if(!date){alert('الرجاء إدخال تاريخ الإرجاع');return;}
  for(const l of items){
    const qtyReturned=parseInt(document.getElementById('rg-qty-'+l.id).value)||0;
    const qtyDamaged=parseInt(document.getElementById('rg-dmg-'+l.id).value)||0;
    if(qtyReturned<=0||qtyReturned>l.qty){alert('العدد الراجع غير صحيح لأحد الأصناف: '+(findAsset(l.assetId)?.name||''));return;}
    if(qtyDamaged>qtyReturned){alert('عدد التالف لا يمكن أن يتجاوز العدد الراجع');return;}
    const reason=document.getElementById('rg-reason-'+l.id).value.trim();
    if(qtyDamaged>0&&!reason){alert('أدخل وصف التلف لصنف: '+(findAsset(l.assetId)?.name||''));return;}
  }
  items.forEach(l=>{
    const a=findAsset(l.assetId);
    const qtyReturned=parseInt(document.getElementById('rg-qty-'+l.id).value)||0;
    const qtyDamaged=parseInt(document.getElementById('rg-dmg-'+l.id).value)||0;
    const reason=document.getElementById('rg-reason-'+l.id).value.trim();
    const goodQty=qtyReturned-qtyDamaged;
    a.qtyLoaned-=qtyReturned; a.qtyAvailable+=goodQty; l.qty-=qtyReturned;
    l.totalDamaged=(l.totalDamaged||0)+qtyDamaged;
    seq.ret++;
    state.returns.push({id:seq.ret,loanId:l.id,qtyReturned,qtyDamaged,reason,date});
    if(qtyDamaged>0){
      seq.dmg++;
      state.damages.unshift({id:seq.dmg,assetId:a.id,assetName:a.name,loanNumber:l.number,qty:qtyDamaged,reason,status:'بانتظار الاعتماد',date});
      addNotification('damage',`يوجد طلب اعتماد تلفيات جديد على (${a.name}) — العدد: ${qtyDamaged}`);
    }
    l.status = l.qty<=0 ? 'مرجعة بالكامل' : 'مرجعة جزئياً';
  });
  addAudit(state.users.find(u=>u.username===state.currentUser)?.fullName||state.currentRole,'إرجاع عهدة (مجمّعة)','asset_returns',groupNumber);
  addNotification('loan',`تم إرجاع عهدة ${groupNumber} (${items.length} صنف)`);
  closeModal();render();
}

function confirmRejectDamage(id){

function submitReserve(){
  const user=document.getElementById('rs-user').value.trim();
  if(!user){alert('الرجاء إدخال اسم المستخدم');return;}
  const clubField=document.getElementById('rs-club')||document.getElementById('rs-club-fixed');
  const clubId=parseInt(clubField.value)||null;
  const validItems=reserveItems.filter(it=>it.assetId);
  if(!validItems.length){alert('الرجاء إضافة صنف واحد على الأقل');return;}
  for(const it of validItems){
    const a=findAsset(parseInt(it.assetId));
    if(!a){alert('أصل غير صالح');return;}
    if(!it.qty||it.qty<=0||it.qty>a.qtyAvailable){alert(`العدد المطلوب لـ${a.name} غير متاح. المتاح حاليًا: ${a.qtyAvailable}`);return;}
  }
  const reserveDate=document.getElementById('rs-date').value;
  const expiry=document.getElementById('rs-exp').value;
  validItems.forEach(it=>{
    const a=findAsset(parseInt(it.assetId));
    a.qtyAvailable-=it.qty; a.qtyReserved+=it.qty;
    seq.res++;
    state.reservations.push({id:seq.res,assetId:a.id,assetName:a.name,clubId,userName:user,qty:it.qty,reserveDate,expiry,status:'نشط'});
  });
  addAudit(user,'حجز أصل','reservations',validItems.map(it=>findAsset(parseInt(it.assetId)).name).join('، '));
  closeModal();
}
function acceptReservation(id){
  const r=state.reservations.find(x=>x.id===id); if(!r) return;
  const a=findAsset(r.assetId); if(!a) return;
  a.qtyReserved-=r.qty; a.qtyLoaned+=r.qty;
  const recipientUser=state.users.find(u=>u.fullName===r.userName);
  seq.loan++;
  const num='AS-'+pad(seq.loan,4);
  state.loans.push({id:seq.loan, number:num, groupNumber:num, assetId:a.id, clubId:r.clubId,
    recipient:r.userName, phone:recipientUser?recipientUser.phone:'', qty:r.qty,
    issueDate:r.reserveDate, expectedReturn:r.expiry||'', status:'نشطة',
    createdBy:state.users.find(u=>u.username===state.currentUser)?.fullName||state.currentRole});
  r.status='تم التحويل لعهدة';
  addAudit(state.currentRole,'قبول حجز وتحويله لعهدة','reservations',r.assetName);
  addNotification('loan',`تم قبول حجز (${a.name}) وتحويله لسند إخراج عهدة ${num} باسم ${r.userName}`);
  render();
}
function openCancelReservationModal(id){

  openModal(`

function cancelReservation(id){
  const r=state.reservations.find(x=>x.id===id); if(!r) return;
  const reasonEl=document.getElementById('cr-reason');
  const reason=reasonEl?reasonEl.value.trim():'';
  if(reasonEl&&!reason){alert('الرجاء إدخال سبب الإلغاء ليتم إبلاغ النادي الطالب');return;}
  const a=findAsset(r.assetId);
  if(a){ a.qtyReserved-=r.qty; a.qtyAvailable+=r.qty; }
  r.status='ملغي'; r.cancelReason=reason||r.cancelReason||'';
  addNotification('loan',`تم إلغاء حجز (${r.assetName}) لنادي ${findClub(r.clubId)?.name||r.userName} — السبب: ${r.cancelReason||'—'}`);
  addAudit(currentUserObj()?.fullName||state.currentRole,'إلغاء حجز','reservations',r.assetName);
  closeModal();render();
}

// Parses pasted text like "كرات قدم 5" أو "كرات قدم x5" أو "كرات قدم - 5" سطرًا سطرًا إلى أصناف وأعداد
function parsePastedOrders(text){
  if(!text||!text.trim())return;
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const parsed=[];
  lines.forEach(line=>{
    const m=line.match(/^(.*?)[\s\-–xX×*]*?(\d+)\s*$/);
    if(m&&m[1].trim()){
      parsed.push({item:m[1].trim().replace(/[-–xX×*]\s*$/,'').trim(), qty:parseInt(m[2])||1, unit:'قطعة'});
    } else if(line){
      parsed.push({item:line, qty:1, unit:'قطعة'});
    }
  });
  if(parsed.length){ prItems=parsed; refreshPrItemsUI(); }
}
function submitPR(){

  if(!document.getElementById('p-date').value){alert('الرجاء إدخال تاريخ الطلب');return;}
  seq.pr++;

  state.purchaseRequests.push({
    id:seq.pr, number:num, requester, clubId,
    items:validItems, item:validItems[0].item, qty:validItems[0].qty,

function submitIssueFromPR(prId){
  const p=state.purchaseRequests.find(x=>x.id===prId); if(!p) return;
  const recipientUser=state.users.find(u=>u.fullName===p.requester)||{fullName:p.requester,phone:'',clubId:p.clubId};
  const issueDate=document.getElementById('i-issue').value;
  const expectedReturn=document.getElementById('i-exp').value;
  if(!issueDate||!expectedReturn){alert('الرجاء تعبئة تاريخ الخروج وتاريخ الإرجاع المتوقع');return;}
  // كل قطعة يجب أن تكون مصنّفة بالكامل قبل الإتمام
  for(const it of issueItems){
    if(!it.type){alert(`الرجاء تحديد نوع الصنف "${it.item}" (مستهلك أو أصل ثابت) قبل المتابعة`);return;}
    if(it.type==='أصل ثابت'&&!it.assetId&&!it.isNew){alert(`الرجاء ربط الصنف "${it.item}" بأصل موجود أو اختيار إضافته كأصل جديد`);return;}
    if(it.type==='أصل ثابت'&&it.isNew){
      const dup=state.assets.find(a=>a.category!=='مواد استهلاكية'&&a.name.trim().toLowerCase()===it.item.trim().toLowerCase());
      if(dup){alert(`الأصل "${it.item}" موجود مسبقًا في سجل الأصول (${dup.code}) — لا يُسمح بإضافته كأصل مكرر. الرجاء اختياره من القائمة بدلاً من "إضافته كأصل جديد" ليتم دمج العدد معه.`);return;}
    }
  }
  const createdBy=currentUserObj()?.fullName||state.currentRole;
  const groupNo='AS-'+pad(seq.loan+1,4);
  let issuedCount=0, consumedCount=0;
  issueItems.forEach(it=>{
    if(it.type==='مستهلك'){
      let a=state.assets.find(x=>x.name===it.item&&x.category==='مواد استهلاكية');
      if(a){ a.qtyTotal+=it.qty; a.qtyAvailable+=it.qty; }
      else{
        seq.asset++;
        state.assets.push({id:seq.asset, code:'AST-'+pad(seq.asset,3), name:it.item, category:'مواد استهلاكية',
          unit:it.unit||'قطعة', qtyTotal:it.qty, qtyAvailable:it.qty, qtyLoaned:0, qtyDamaged:0, qtyReserved:0,
          location:'مستودع المواد الاستهلاكية', shelf:'—', col:'—', entryDate:issueDate, condition:'جديد', linkedPR:p.number});
      }
      consumedCount++;
    } else if(it.type==='أصل ثابت'){
      let a;
      if(it.isNew){
        seq.asset++;
        a={id:seq.asset, code:'AST-'+pad(seq.asset,3), name:it.item, category:'أثاث',
          unit:it.unit||'قطعة', qtyTotal:it.qty, qtyAvailable:it.qty, qtyLoaned:0, qtyDamaged:0, qtyReserved:0,
          location:'المستودع الرئيسي', shelf:'—', col:'—', entryDate:issueDate, condition:'جديد', linkedPR:p.number};
        state.assets.push(a);
      } else {
        a=findAsset(parseInt(it.assetId));
        a.qtyTotal+=it.qty; a.qtyAvailable+=it.qty;
      }
      a.qtyAvailable-=it.qty; a.qtyLoaned+=it.qty;
      seq.loan++;
      state.loans.push({id:seq.loan, number:'AS-'+pad(seq.loan,4), groupNumber:groupNo, assetId:a.id, clubId:p.clubId,
        recipient:p.requester, phone:recipientUser.phone||'', qty:it.qty, issueDate, expectedReturn,
        purpose:'ترحيل من طلب شراء '+p.number, status:'نشطة', createdBy});
      issuedCount++;
    }
  });
  p.status='تم الشراء'; p.convertedToLoan=issuedCount?groupNo:''; p.processingStatus='fullyEntered'; p.processedDate=issueDate;
  addNotification('loan',`تم ترحيل طلب الشراء ${p.number}: ${issuedCount} صنف كعهدة/أصل، ${consumedCount} صنف كمستهلك`);
  addAudit(createdBy,'ترحيل طلب شراء (تصنيف لكل قطعة)','purchase_requests',p.number);
  closeModal();render();
}

function getSelectedItemsForApproval(){
  const keys=[...document.querySelectorAll('.pa-check:checked')].map(c=>c.value);
  if(!keys.length){alert('اختر صنفًا واحدًا على الأقل');return null;}
  const out=[];
  for(const key of keys){
    const [prId,idx]=key.split(':').map(Number);
    const p=state.purchaseRequests.find(x=>x.id===prId); if(!p)continue;
    const items=prItemsNormalized(p);
    const it=items[idx]; if(!it)continue;
    if(it.processed){alert(`لا يمكن تحويل الصنف "${it.item}" أكثر من مرة`);return null;}
    out.push({p,it,idx});
  }
  return out;
}

function doConvertItems(list,mode,opts){
  const user=currentUserObj()?.fullName||state.currentRole;
  const date=todayStr();
  list.forEach(({p,it})=>{
    const recipientUser=state.users.find(u=>u.fullName===p.requester);
    const isStockConsumable=mode==='consumable';
    const isConsumableCustody=mode==='consumableCustody';
    const givenOut=(mode==='consumableCustody'||mode==='returnableCustody');
    const assetCategory=(isStockConsumable||isConsumableCustody)?'مواد استهلاكية':'أثاث';
    let asset=state.assets.find(a=>a.name.trim().toLowerCase()===it.item.trim().toLowerCase()&&a.category===assetCategory);
    let code;
    if(asset){
      asset.qtyTotal+=it.qty;
      if(givenOut){ asset.qtyLoaned+=it.qty; } else { asset.qtyAvailable+=it.qty; }
      code=asset.code;
    } else {
      seq.asset++;
      code='AST-'+pad(seq.asset,3);
      asset={
        id:seq.asset, code, name:it.item, category:assetCategory,
        unit:it.unit||'قطعة', qtyTotal:it.qty,
        qtyAvailable: givenOut?0:it.qty, qtyLoaned: givenOut?it.qty:0, qtyDamaged:0, qtyReserved:0,
        location: (isStockConsumable||isConsumableCustody)?'مستودع المواد الاستهلاكية':'المستودع الرئيسي', shelf:'—', col:'—',
        entryDate:date, condition:'جديد', linkedPR:p.number
      };
      state.assets.push(asset);
    }
    let ref=code;
    if(givenOut){
      seq.loan++;
      const loanNum='AS-'+pad(seq.loan,4);
      state.loans.push({
        id:seq.loan, number:loanNum, groupNumber:loanNum, assetId:asset.id, clubId:p.clubId,
        recipient:p.requester, phone:recipientUser?recipientUser.phone:'', qty:it.qty, issueDate:date,
        expectedReturn: mode==='returnableCustody'?opts.expReturn:'', purpose:'تحويل من طلب شراء '+p.number,
        custodyType: isConsumableCustody?'consumable':'returnable',
        status: isConsumableCustody?'عهدة مستهلكة غير راجعة':'نشطة', createdBy:user
      });
      ref=loanNum;
    }
    it.processed=mode; it.processedDate=date; it.processedRef=ref;
    addAudit(user,'تحويل صنف من طلب شراء — '+(PROCESSING_LABELS[mode]||mode),'purchase_requests',p.number+' / '+it.item);
    // إذا اكتملت معالجة كل أصناف الطلب، حدّث حالته العامة
    const allItems=prItemsNormalized(p);
    if(allItems.every(x=>x.processed)){
      p.processingStatus='fullyEntered';
      p.status = allItems.every(x=>x.processed==='fixed')?'محول إلى أصل':
                 allItems.every(x=>x.processed==='consumable')?'محول إلى أصل استهلاكي':
                 allItems.every(x=>x.processed==='consumableCustody')?'محول إلى عهدة مستهلكة':
                 allItems.every(x=>x.processed==='returnableCustody')?'محول إلى عهدة راجعة':'تم الاستلام';
    }
  });
  addNotification('pr',`تمت معالجة ${list.length} صنف من طلبات الشراء (${PROCESSING_LABELS[mode]})`);
  render();
}

function captureCurrentFormValues(){
  const modalEl=document.querySelector('.modal');
  const data={};
  if(modalEl){
    modalEl.querySelectorAll('input[id],select[id],textarea[id]').forEach(el=>{
      data[el.id]= el.type==='checkbox'? el.checked : el.value;
    });
  }
  return data;
}
function restoreFormValues(data){
  if(!data)return;
  Object.keys(data).forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    if(el.type==='checkbox') el.checked=data[id]; else el.value=data[id];
  });
}

function submitAddUser(){
  const fullName=document.getElementById('au-name').value.trim();
  const username=document.getElementById('au-username').value.trim();
  const phone=document.getElementById('au-phone').value.trim();
  if(!fullName||!username||!phone){alert('الرجاء تعبئة الاسم ورقم الجوال واسم المستخدم');return;}
  if(!/^[0-9]{8}$/.test(phone)){alert('رقم الجوال يجب أن يتكون من 8 أرقام بالضبط');return;}
  if(state.users.some(u=>u.username===username)){alert('اسم المستخدم محجوز بالفعل، اختر اسماً آخر');return;}
  if(state.users.some(u=>u.phone===phone)){alert('رقم الجوال مسجّل مسبقًا لمستخدم آخر');return;}
  seq.user++;
  state.users.push({id:seq.user, fullName, phone, username, password:document.getElementById('au-pass').value||'123456',
    role:document.getElementById('au-role').value, clubId:parseInt(document.getElementById('au-club').value), status:'approved'});
  addAudit(state.currentRole,'إضافة مستخدم','users',username);
  closeModal();render();
}
function suspendUser(id){
  const u=state.users.find(x=>x.id===id); if(!u) return;
  if(!confirm('تعليق حساب '+u.fullName+'؟ لن يتمكن من الدخول حتى تتم إعادة تفعيله.'))return;
  u.status='suspended';
  addAudit(state.currentRole,'تعليق مستخدم','users',u.username);
  render();
}
function reactivateUser(id){
  const u=state.users.find(x=>x.id===id); if(!u) return;
  u.status='approved';
  addAudit(state.currentRole,'إعادة تفعيل مستخدم','users',u.username);
  render();
}
function approveUser(id){
  const u=state.users.find(x=>x.id===id); if(!u) return;
  u.status='approved';
  addNotification('user',`تمت الموافقة على تسجيل ${u.fullName}`);
  addAudit(state.currentRole,'قبول تسجيل مستخدم','users',u.username);
  render();
}
function rejectUser(id){
  const u=state.users.find(x=>x.id===id); if(!u) return;
  u.status='rejected';
  addNotification('user',`تم رفض طلب تسجيل ${u.fullName}`);

      const key=p.requester;
      if(!byUser[key]) byUser[key]={requester:key,club:findClub(p.clubId)?.name||'—',items:[]};
      (p.items&&p.items.length?p.items:[{item:p.item,qty:p.qty,unit:p.unit}]).forEach(it=>byUser[key].items.push({...it,number:p.number,status:p.status}));
    });
    const filterUi=`<div class="field" style="max-width:260px;margin-bottom:14px;"><label>تصفية حسب حالة الطلب</label>
      <select onchange="state.reportPRStatus=this.value;render()">
        <option value="">كل الحالات</option>
        <option value="جديد" ${statusF==='جديد'?'selected':''}>جديد</option>
        <option value="تحت الإجراء" ${statusF==='تحت الإجراء'?'selected':''}>تحت الإجراء</option>
        <option value="تم الشراء" ${statusF==='تم الشراء'?'selected':''}>تم الشراء</option>
        <option value="تم الاستلام" ${statusF==='تم الاستلام'?'selected':''}>تم الاستلام</option>
        <option value="ملغي" ${statusF==='ملغي'?'selected':''}>ملغي</option>
      </select></div>`;
    table=filterUi+Object.values(byUser).map(u=>`
      <div class="card" style="margin-bottom:14px;overflow:hidden;">
        <div style="padding:12px 16px;font-weight:800;border-bottom:1px solid var(--border);">${ic('users',15)} ${escapeHtml(u.requester)} <span style="color:var(--hint);font-weight:400;font-size:12px;">— ${escapeHtml(u.club)}</span></div>
        <table>
          <thead><tr><th>رقم الطلب</th><th>الصنف</th><th>العدد</th><th>النوع</th><th>الحالة</th><th>تصنيف التحويل</th></tr></thead>
          <tbody>${u.items.map(it=>`<tr><td>${it.number}</td><td style="font-weight:700;">${escapeHtml(it.item)}</td><td>${it.qty}</td><td>${escapeHtml(it.unit||'قطعة')}</td><td>${prStatusPill(it.status)}</td><td>${it.processed?`<span class="pill green">${PROCESSING_LABELS[it.processed]||it.processed}</span>`:`<span class="pill amber">لم تُصنَّف بعد</span>`}</td></tr>`).join('')}</tbody>
        </table>
      </div>`).join('')||`<div class="empty">لا توجد طلبات شراء مطابقة</div>`;
  } else if(state.reportTab==='comprehensive'){
    const totalQty=state.assets.reduce((s,a)=>s+a.qtyTotal,0);
    const totalOut=state.assets.reduce((s,a)=>s+a.qtyLoaned,0);
    const totalDmg=state.assets.reduce((s,a)=>s+a.qtyDamaged,0);
    const totalAvail=state.assets.reduce((s,a)=>s+a.qtyAvailable,0);
    table=`
      <div class="grid cols-4" style="margin-bottom:16px;">
        ${statCard('إجمالي الأصول',totalQty,'كل الأصناف المسجلة','box','teal')}
        ${statCard('خارج المخزن',totalOut,'عهد قيد التسليم','out','amber')}
        ${statCard('التالف',totalDmg,'أصول تالفة معتمدة أو بالانتظار','alert','coral')}
        ${statCard('المتاح الآن',totalAvail,'جاهز للإخراج فورًا','check','green')}
      </div>
      <div class="table-wrap card"><table>
        <thead><tr><th>رقم الأصل</th><th>الأصل</th><th>الإجمالي</th><th>خارج المخزن</th><th>التالف</th><th>المتاح</th></tr></thead>
        <tbody>${state.assets.map(a=>`<tr><td style="font-weight:700;color:var(--muted);font-size:12px;">${a.code}</td><td style="font-weight:700;">${escapeHtml(a.name)}</td><td>${a.qtyTotal}</td><td>${a.qtyLoaned}</td><td>${a.qtyDamaged}</td><td>${a.qtyAvailable}</td></tr>`).join('')}</tbody>
      </table></div>`;
  }
  return `
    <div class="section-head"><div><h2>مركز التقارير</h2><p>تقارير محسوبة مباشرة من بيانات النظام الحالية</p></div>
      <div style="display:flex;gap:8px;">
        ${state.reportTab==='assets'?`<button class="btn danger sm" onclick="switchReportTab('damages')">${ic('alert',13)} تقرير التالف والضائع</button>`:''}
        <button class="btn secondary sm" onclick="printReportTab()">${ic('printer',13)} طباعة التقرير</button>
      </div>
    </div>
    ${tabsHtml}
    ${table}`;
}
function printReportTab(){
  const titles={assets:'تقرير الأصول',loans:'تقرير العهد الخارجة',consumableCustody:'تقرير العهد المستهلكة (غير الراجعة)',overdue:'تقرير العهد المتأخرة والقريبة الاستحقاق',
    damages:'تقرير التلفيات',stock:'تقرير المخزون',clubs:'تقرير حسب النادي',byclub:'تقرير حسب النادي المحدد',users:'تقرير حسب المستخدم',purchases:'تقرير طلبات الشراء',comprehensive:'تقرير شامل — الأصول والخروج والتلفيات والإجمالي'};
  const title=titles[state.reportTab]||'تقرير';
  const rng=state.reportRange||{from:'',to:''};
  const inRange=d=>{ if(!d)return true; if(rng.from&&d<rng.from)return false; if(rng.to&&d>rng.to)return false; return true; };
  let headers=[],rows=[],rowFlags=[];
  if(state.reportTab==='assets'){
    headers=['الأصل','التصنيف','الإجمالي','المتاح','الخارج','التالف','المحجوز'];
    const fa=state.assets.filter(a=>a.category!=='مواد استهلاكية');
    rows=fa.map(a=>[a.name,a.category,a.qtyTotal,a.qtyAvailable,a.qtyLoaned,a.qtyDamaged,a.qtyReserved]);
    rowFlags=fa.map(a=>a.qtyDamaged>0);
  }else if(state.reportTab==='loans'){
    headers=['رقم العملية','النادي','الصنف','المستلم','رقم الجوال','العدد','تاريخ الخروج','تاريخ العودة','الحالة'];
    rows=state.loans.filter(l=>l.status!=='مرجعة بالكامل'&&l.custodyType!=='consumable').filter(l=>inRange(l.issueDate)).map(l=>{const a=findAsset(l.assetId);return [l.number,findClub(l.clubId)?.name||'—',a?a.name:'—',l.recipient,l.phone||'—',l.qty,l.issueDate,l.expectedReturn||'—',l.status];});
    rowFlags=state.loans.filter(l=>l.status!=='مرجعة بالكامل'&&l.custodyType!=='consumable').filter(l=>inRange(l.issueDate)).map(l=>(l.totalDamaged||0)>0);
  }else if(state.reportTab==='consumableCustody'){
    headers=['رقم العملية','النادي','الصنف','المستلم','رقم الجوال','العدد','تاريخ الخروج'];
    rows=state.loans.filter(l=>l.custodyType==='consumable').filter(l=>inRange(l.issueDate)).map(l=>{const a=findAsset(l.assetId);return [l.number,findClub(l.clubId)?.name||'—',a?a.name:'—',l.recipient,l.phone||'—',l.qty,l.issueDate];});
  }else if(state.reportTab==='overdue'){
    headers=['رقم العملية','النادي','الصنف','العدد','الإرجاع المتوقع','الحالة'];
    rows=state.loans.filter(l=>returnUrgency(l)).map(l=>[l.number,findClub(l.clubId)?.name||'—',findAsset(l.assetId)?.name||'—',l.qty,l.expectedReturn,returnUrgency(l).label]);
  }else if(state.reportTab==='damages'){
    headers=['اسم الأصل','عدد التالف','السبب','الحالة','التاريخ','النادي','اسم المتعهد','رقم الهاتف','تاريخ الخروج'];
    rows=state.damages.filter(d=>inRange(d.date)).map(d=>{
      const loan=state.loans.find(l=>l.number===d.loanNumber);
      const club=loan?findClub(loan.clubId):null;
      return [d.assetName,d.qty,d.reason,d.status,d.date,club?club.name:'—',loan?loan.recipient:'—',loan?(loan.phone||'—'):'—',loan?loan.issueDate:'—'];
    });
    rowFlags=rows.map(()=>true);
  }else if(state.reportTab==='stock'){
    headers=['الأصل','الرصيد الكلي','خرج (معار)','تالف','الرصيد الحالي (متاح)'];
    rows=state.assets.filter(a=>a.category!=='مواد استهلاكية').map(a=>[a.name,a.qtyTotal,a.qtyLoaned,a.qtyDamaged,a.qtyAvailable]);
  }else if(state.reportTab==='clubs'){
    headers=['النادي','عدد العهد المستلمة','عهد نشطة حالياً','عدد التلفيات'];
    rows=state.clubs.map(c=>{const cl=state.loans.filter(l=>l.clubId===c.id);const active=cl.filter(l=>l.status==='نشطة'||l.status==='متأخرة').length;const dmg=state.damages.filter(d=>cl.some(l=>l.number===d.loanNumber)).length;return [c.name,cl.length,active,dmg];});
  }else if(state.reportTab==='byclub'){
    const club=findClub(parseInt(state.reportClubId));
    headers=['رقم العملية','الأصل','المستلم','رقم الجوال','العدد','تاريخ الخروج','الحالة'];
    rows=state.loans.filter(l=>l.clubId===club?.id&&inRange(l.issueDate)).map(l=>[l.number,findAsset(l.assetId)?.name||'—',l.recipient,l.phone||'—',l.qty,l.issueDate,l.status]);
    rowFlags=state.loans.filter(l=>l.clubId===club?.id&&inRange(l.issueDate)).map(l=>(l.totalDamaged||0)>0);
  }else if(state.reportTab==='users'){
    headers=['المستخدم','رقم الجوال','الدور','عدد العمليات'];
    rows=state.users.filter(u=>u.status==='approved').map(u=>[u.fullName,u.phone||'—',u.role,state.auditLogs.filter(l=>l.user===u.fullName).length]);
  }else if(state.reportTab==='comprehensive'){
    headers=['رقم الأصل','الأصل','الإجمالي','خارج المخزن','التالف','المتاح'];
    rows=state.assets.map(a=>[a.code,a.name,a.qtyTotal,a.qtyLoaned,a.qtyDamaged,a.qtyAvailable]);
    rowFlags=state.assets.map(a=>a.qtyDamaged>0);
  }else if(state.reportTab==='purchases'){
    headers=['رقم الطلب','مقدم الطلب','رقم الجوال','الصنف','العدد','النوع','الحالة','تصنيف التحويل'];
    const statusF=state.reportPRStatus;
    rows=[];
    state.purchaseRequests.filter(p=>!statusF||p.status===statusF).filter(p=>inRange(p.date)).forEach(p=>{
      const requesterUser=state.users.find(u=>u.fullName===p.requester);
      (p.items&&p.items.length?p.items:[{item:p.item,qty:p.qty,unit:p.unit}]).forEach(it=>{
        rows.push([p.number,p.requester,requesterUser?requesterUser.phone:'—',it.item,it.qty,it.unit||'قطعة',p.status,it.processed?(PROCESSING_LABELS[it.processed]||it.processed):'لم تُصنَّف بعد']);
      });
    });
  }
  const now=new Date();
  const printDate=now.toLocaleDateString('en-GB',{year:'numeric',month:'long',day:'numeric'});
  const w=window.open('','_blank');
  w.document.write(`<html dir="rtl"><head><meta charset="UTF-8"><title>${title}</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    @page{size:A4 landscape;margin:12mm}
    body{font-family:'Tajawal',Arial;padding:0;margin:0;color:#16212B;background:#fff}
    .wrap{padding:14px 22px}
    .hdr{display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #1B5FA6;padding-bottom:10px;margin-bottom:6px;direction:ltr}
    .logo{width:52px;height:52px;border-radius:11px;background:#1B5FA6;color:#8A1538;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid #8A1538}
    .org{font-weight:900;font-size:15px;color:#0B3B6B;text-align:right;direction:rtl}
    .org-sub{font-size:10.5px;color:#5B6A78;text-align:right;direction:rtl;margin-top:2px}
    .date{font-size:10px;color:#5B6A78;text-align:left}
    .title-box{background:linear-gradient(135deg,#1B5FA6,#0B3B6B);color:#fff;text-align:center;padding:9px 18px;border-radius:9px;margin:14px 0;font-size:15px;font-weight:800;
      box-shadow:0 0 20px rgba(27,95,166,.45), inset 0 0 14px rgba(138,21,56,.3)}
    table{width:100%;border-collapse:collapse;font-size:11.5px}
    th{background:#1B5FA6;color:#fff;padding:7px 9px;border:1px solid #0B3B6B;text-align:right}
    td{padding:6px 9px;border:1px dashed #9fb3c4;text-align:right}
    tr:nth-child(even) td{background:#F5F7FA}
    .date{direction:rtl;text-align:left}
    .ftr{margin-top:16px;border-top:1.5px solid #1B5FA6;padding-top:6px;display:flex;justify-content:space-between;font-size:9.5px;color:#5B6A78}
  </style></head><body><div class="wrap">
    <div class="hdr">${printLogoHtml(52)}<div class="date">تاريخ الطباعة<br><strong>${printDate}</strong></div>
      <div><div class="org">${escapeHtml(state.orgName)}</div><div class="org-sub">نظام إدارة الأصول والعهد والأندية</div></div></div>
    <div class="title-box">${title}</div>
    ${(rng.from||rng.to)?`<div style="text-align:center;font-size:11px;color:#5B6A78;margin-bottom:10px;">الفترة: من ${rng.from||'البداية'} إلى ${rng.to||'اليوم'}</div>`:''}
    <table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map((r,i)=>`<tr${rowFlags[i]?' style="background:#FBE0E2;"':''}>${r.map(c=>`<td>${c===undefined||c===''?'—':c}</td>`).join('')}</tr>`).join('')||`<tr><td colspan="${headers.length}" style="text-align:center">لا توجد بيانات</td></tr>`}</tbody></table>
    <div class="ftr"><span>نظام إدارة الأصول والعهد والأندية</span><span>${printDate}</span></div>
  </div><script>window.onload=()=>window.print();<\/script></body></html>`);
  w.document.close();
}

/* ---------------------- الإشعارات ---------------------- */
function renderNotifications(){
  const iconFor={loan:'out',damage:'alert',pr:'cart',user:'users'};
  const ramp={loan:'teal',damage:'coral',pr:'amber',user:'teal'};
  return `
    <div class="section-head"><div><h2>كل الإشعارات</h2><p>${state.notifications.length} إشعار</p></div></div>
    <div class="card"><div class="pad">
      ${state.notifications.map(n=>`
        <div class="n-item">
          <span class="n-ic" style="background:var(--${ramp[n.type]||'gray'}-bg,var(--surface-alt));color:var(--${ramp[n.type]||'gray'},var(--muted));">${ic(iconFor[n.type]||'bell',16)}</span>
          <div><p class="t">${escapeHtml(n.text)}</p><div class="d">${escapeHtml(n.time)}</div></div>
        </div>`).join('')||`<div class="empty">لا توجد إشعارات</div>`}
    </div></div>`;
}

initFirebaseSync();
</script>
